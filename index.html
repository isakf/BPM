<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>BPM</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–black: #000;
–white: #fff;
–gray: #666;
–dim: #333;
–rule: #1a1a1a;
–red: #ff2800;
–sans: system-ui, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
–mono: ui-monospace, ‘SF Mono’, ‘Menlo’, ‘Consolas’, monospace;
}

html, body {
height: 100%;
background: var(–black);
color: var(–white);
font-family: var(–sans);
-webkit-font-smoothing: antialiased;
overflow: hidden;
}

body {
display: flex;
flex-direction: column;
padding: 24px;
padding-top: max(24px, env(safe-area-inset-top));
padding-bottom: max(24px, env(safe-area-inset-bottom));
gap: 0;
}

.topbar {
display: flex;
justify-content: space-between;
align-items: baseline;
padding-bottom: 12px;
border-bottom: 1px solid var(–rule);
}

.title {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
}

.range {
font-family: var(–mono);
font-size: 10px;
color: var(–gray);
letter-spacing: 0.04em;
}

.hero {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
align-items: flex-start;
position: relative;
min-height: 0;
}

.bpm-row {
display: flex;
align-items: baseline;
gap: 8px;
}

.bpm-value {
font-size: clamp(100px, 28vw, 220px);
font-weight: 800;
line-height: 0.85;
letter-spacing: -0.04em;
color: var(–white);
transition: color 0.2s;
white-space: nowrap;
}

.bpm-value.inactive {
color: var(–dim);
}

.bpm-label {
font-size: 11px;
font-weight: 500;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–gray);
align-self: flex-end;
margin-bottom: 0.18em;
}

.beat-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(–dim);
position: absolute;
top: 0;
right: 0;
margin-top: 4px;
transition: background 0.04s;
}

.beat-dot.flash {
background: var(–red);
}

.meta-row {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 0;
border-top: 1px solid var(–rule);
}

.meta-label {
font-size: 9px;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–gray);
width: 80px;
flex-shrink: 0;
}

.conf-track {
flex: 1;
max-width: 140px;
height: 1px;
background: var(–rule);
position: relative;
}

.conf-fill {
position: absolute;
top: 0;
left: 0;
height: 1px;
width: 0%;
background: var(–white);
transition: width 0.5s ease;
}

.viz-section {
display: flex;
flex-direction: column;
gap: 0;
}

.viz-row {
border-top: 1px solid var(–rule);
}

.viz-row-label {
font-size: 9px;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–gray);
padding: 10px 0 4px 0;
}

.viz-row canvas {
width: 100%;
height: 48px;
display: block;
}

.bottom-bar {
display: flex;
justify-content: space-between;
align-items: center;
padding-top: 14px;
border-top: 1px solid var(–rule);
}

.btn {
font-family: var(–sans);
font-size: 10px;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
padding: 10px 28px;
border: 1px solid var(–gray);
border-radius: 0;
background: transparent;
color: var(–white);
cursor: pointer;
transition: all 0.1s;
outline: none;
-webkit-appearance: none;
-webkit-tap-highlight-color: transparent;
}

.btn:hover { border-color: var(–white); }
.btn:active { background: var(–white); color: var(–black); }

.btn.active {
border-color: var(–red);
color: var(–red);
}

.btn.active:hover {
background: var(–red);
color: var(–black);
}

.status {
font-family: var(–mono);
font-size: 10px;
color: var(–dim);
letter-spacing: 0.04em;
}

.status.live {
color: var(–red);
}

.status.live::before {
content: ‘\25CF’;
margin-right: 5px;
}
</style>

</head>
<body>

<div class="topbar">
  <div class="title">BPM Detector</div>
  <div class="range">70-180</div>
</div>

<div class="hero">
  <div class="beat-dot" id="beatDot"></div>
  <div class="bpm-row">
    <div class="bpm-value inactive" id="bpmDisplay">0</div>
    <div class="bpm-label">BPM</div>
  </div>
</div>

<div class="meta-row">
  <span class="meta-label">Confidence</span>
  <div class="conf-track">
    <div class="conf-fill" id="confidenceBar"></div>
  </div>
</div>

<div class="viz-section">
  <div class="viz-row">
    <div class="viz-row-label">Waveform</div>
    <canvas id="waveCanvas"></canvas>
  </div>
  <div class="viz-row">
    <div class="viz-row-label">Energy</div>
    <canvas id="energyCanvas"></canvas>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn" id="toggleBtn">Start</button>
  <div class="status" id="statusLabel">Idle</div>
</div>

<script>
let audioCtx = null;
let micStream = null;
let sourceNode = null;
let filterNode = null;
let analyserNode = null;
let captureNode = null;
let running = false;
let animFrame = null;
let analysisTimer = null;

const ENV_HOP = 256;
const ENV_SECONDS = 10;
let envRate = 44100 / ENV_HOP;
let envBufferSize = Math.ceil(envRate * ENV_SECONDS);
let envBuffer = new Float32Array(envBufferSize);
let envWriteIdx = 0;
let envSampleCount = 0;

let smoothedBpm = 0;
let confidence = 0;
const BPM_MIN = 70;
const BPM_MAX = 180;
const SMOOTH_ALPHA = 0.25;

let lastBeatTime = 0;
let beatInterval = 0;

const bpmDisplay = document.getElementById('bpmDisplay');
const confidenceBar = document.getElementById('confidenceBar');
const beatDot = document.getElementById('beatDot');
const waveCanvas = document.getElementById('waveCanvas');
const energyCanvas = document.getElementById('energyCanvas');
const toggleBtn = document.getElementById('toggleBtn');
const statusLabel = document.getElementById('statusLabel');
const waveCtx = waveCanvas.getContext('2d');
const energyCtx = energyCanvas.getContext('2d');

function resizeCanvases() {
  for (const c of [waveCanvas, energyCanvas]) {
    const rect = c.getBoundingClientRect();
    c.width = rect.width * devicePixelRatio;
    c.height = rect.height * devicePixelRatio;
  }
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

async function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  envRate = audioCtx.sampleRate / ENV_HOP;
  envBufferSize = Math.ceil(envRate * ENV_SECONDS);
  envBuffer = new Float32Array(envBufferSize);
  envWriteIdx = 0;
  envSampleCount = 0;
  smoothedBpm = 0;
  confidence = 0;

  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  });
  sourceNode = audioCtx.createMediaStreamSource(micStream);

  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 150;
  filterNode.Q.value = 0.7;

  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 2048;
  analyserNode.smoothingTimeConstant = 0.5;

  captureNode = audioCtx.createScriptProcessor(4096, 1, 1);
  let hopAccum = new Float32Array(ENV_HOP);
  let hopIdx = 0;

  captureNode.onaudioprocess = function(e) {
    const input = e.inputBuffer.getChannelData(0);
    for (let i = 0; i < input.length; i++) {
      hopAccum[hopIdx] = input[i];
      hopIdx++;
      if (hopIdx >= ENV_HOP) {
        let sum = 0;
        for (let j = 0; j < ENV_HOP; j++) sum += hopAccum[j] * hopAccum[j];
        envBuffer[envWriteIdx] = Math.sqrt(sum / ENV_HOP);
        envWriteIdx = (envWriteIdx + 1) % envBufferSize;
        envSampleCount++;
        hopIdx = 0;
      }
    }
    const output = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < output.length; i++) output[i] = 0;
  };

  sourceNode.connect(filterNode);
  filterNode.connect(captureNode);
  captureNode.connect(audioCtx.destination);
  sourceNode.connect(analyserNode);

  running = true;
  drawLoop();
  analysisTimer = setInterval(analyzeBpm, 2000);
  setTimeout(analyzeBpm, 4000);
}

function stopAudio() {
  running = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (analysisTimer) clearInterval(analysisTimer);
  if (captureNode) captureNode.disconnect();
  if (filterNode) filterNode.disconnect();
  if (analyserNode) analyserNode.disconnect();
  if (sourceNode) sourceNode.disconnect();
  if (micStream) micStream.getTracks().forEach(function(t) { t.stop(); });
  if (audioCtx) audioCtx.close();
  audioCtx = null;
  smoothedBpm = 0;
  confidence = 0;
  bpmDisplay.textContent = '0';
  bpmDisplay.classList.add('inactive');
  confidenceBar.style.width = '0%';
}

function analyzeBpm() {
  var minSamples = Math.ceil(envRate * 6);
  if (envSampleCount < minSamples) return;

  var useSamples = Math.min(envSampleCount, envBufferSize);
  var envelope = new Float32Array(useSamples);
  var start = (envWriteIdx - useSamples + envBufferSize) % envBufferSize;
  for (var i = 0; i < useSamples; i++) {
    envelope[i] = envBuffer[(start + i) % envBufferSize];
  }

  var mean = 0;
  for (var i = 0; i < useSamples; i++) mean += envelope[i];
  mean /= useSamples;

  var norm = new Float32Array(useSamples);
  for (var i = 0; i < useSamples; i++) norm[i] = envelope[i] - mean;

  var minLag = Math.floor(envRate * 60 / BPM_MAX);
  var maxLag = Math.ceil(envRate * 60 / BPM_MIN);
  var lagRange = maxLag - minLag + 1;
  if (maxLag >= useSamples / 2) return;

  var acf = new Float32Array(lagRange);
  for (var l = 0; l < lagRange; l++) {
    var lag = minLag + l;
    var sum = 0, n1 = 0, n2 = 0;
    var len = useSamples - lag;
    for (var i = 0; i < len; i++) {
      sum += norm[i] * norm[i + lag];
      n1 += norm[i] * norm[i];
      n2 += norm[i + lag] * norm[i + lag];
    }
    var d = Math.sqrt(n1 * n2);
    acf[l] = d > 0 ? sum / d : 0;
  }

  var bestIdx = 0;
  var bestVal = -Infinity;
  for (var l = 1; l < lagRange - 1; l++) {
    if (acf[l] > bestVal && acf[l] > acf[l - 1] && acf[l] > acf[l + 1]) {
      bestVal = acf[l];
      bestIdx = l;
    }
  }

  if (bestVal < 0.05) {
    confidence = Math.max(0, confidence - 0.15);
    confidenceBar.style.width = (confidence * 100) + '%';
    return;
  }

  var refinedIdx = bestIdx;
  if (bestIdx > 0 && bestIdx < lagRange - 1) {
    var a = acf[bestIdx - 1], b = acf[bestIdx], c = acf[bestIdx + 1];
    var denom = a - 2 * b + c;
    if (Math.abs(denom) > 1e-10) refinedIdx = bestIdx + 0.5 * (a - c) / denom;
  }

  var lag = minLag + refinedIdx;
  var bpm = (envRate * 60) / lag;
  while (bpm < BPM_MIN) bpm *= 2;
  while (bpm > BPM_MAX) bpm /= 2;

  if (smoothedBpm === 0) {
    smoothedBpm = bpm;
  } else if (Math.abs(bpm - smoothedBpm) < 15) {
    smoothedBpm = SMOOTH_ALPHA * bpm + (1 - SMOOTH_ALPHA) * smoothedBpm;
  } else {
    smoothedBpm = bpm;
  }

  confidence = Math.min(1, bestVal * 1.5);
  bpmDisplay.textContent = Math.round(smoothedBpm);
  bpmDisplay.classList.remove('inactive');
  confidenceBar.style.width = (confidence * 100) + '%';
  beatInterval = 60000 / smoothedBpm;
}

function drawLoop() {
  if (!running) return;
  animFrame = requestAnimationFrame(drawLoop);
  drawWaveform();
  drawEnergy();
  pulseBeat();
}

function drawWaveform() {
  var w = waveCanvas.width, h = waveCanvas.height;
  waveCtx.clearRect(0, 0, w, h);
  if (!analyserNode) return;

  var data = new Float32Array(analyserNode.fftSize);
  analyserNode.getFloatTimeDomainData(data);

  waveCtx.strokeStyle = 'rgba(255,255,255,0.05)';
  waveCtx.lineWidth = 1;
  waveCtx.beginPath();
  waveCtx.moveTo(0, h / 2);
  waveCtx.lineTo(w, h / 2);
  waveCtx.stroke();

  waveCtx.beginPath();
  waveCtx.strokeStyle = '#fff';
  waveCtx.lineWidth = 1 * devicePixelRatio;
  var sliceW = w / data.length;
  for (var i = 0; i < data.length; i++) {
    var x = i * sliceW;
    var y = (0.5 + data[i] * 0.45) * h;
    if (i === 0) waveCtx.moveTo(x, y); else waveCtx.lineTo(x, y);
  }
  waveCtx.stroke();
}

function drawEnergy() {
  var w = energyCanvas.width, h = energyCanvas.height;
  energyCtx.clearRect(0, 0, w, h);

  var useSamples = Math.min(envSampleCount, envBufferSize);
  if (useSamples < 2) return;

  var showSamples = Math.min(useSamples, Math.ceil(envRate * 4));
  var startIdx = (envWriteIdx - showSamples + envBufferSize) % envBufferSize;

  var maxVal = 0;
  for (var i = 0; i < showSamples; i++) {
    var val = envBuffer[(startIdx + i) % envBufferSize];
    if (val > maxVal) maxVal = val;
  }
  if (maxVal < 0.001) maxVal = 0.001;

  var sliceW = w / showSamples;

  energyCtx.beginPath();
  energyCtx.moveTo(0, h);
  for (var i = 0; i < showSamples; i++) {
    var val = envBuffer[(startIdx + i) % envBufferSize];
    energyCtx.lineTo(i * sliceW, h - (val / maxVal) * h * 0.9);
  }
  energyCtx.lineTo(w, h);
  energyCtx.closePath();
  energyCtx.fillStyle = 'rgba(255,255,255,0.04)';
  energyCtx.fill();

  energyCtx.beginPath();
  for (var i = 0; i < showSamples; i++) {
    var val = envBuffer[(startIdx + i) % envBufferSize];
    var x = i * sliceW, y = h - (val / maxVal) * h * 0.9;
    if (i === 0) energyCtx.moveTo(x, y); else energyCtx.lineTo(x, y);
  }
  energyCtx.strokeStyle = 'rgba(255,255,255,0.5)';
  energyCtx.lineWidth = 1 * devicePixelRatio;
  energyCtx.stroke();
}

function pulseBeat() {
  if (smoothedBpm <= 0 || beatInterval <= 0) return;
  var now = performance.now();
  if (now - lastBeatTime >= beatInterval) {
    lastBeatTime = now - ((now - lastBeatTime) % beatInterval);
    beatDot.classList.add('flash');
    setTimeout(function() { beatDot.classList.remove('flash'); }, 60);
  }
}

toggleBtn.addEventListener('click', async function() {
  if (!running) {
    try {
      toggleBtn.textContent = '...';
      statusLabel.textContent = 'Connecting';
      await startAudio();
      toggleBtn.textContent = 'Stop';
      toggleBtn.classList.add('active');
      statusLabel.textContent = 'Listening';
      statusLabel.classList.add('live');
    } catch (err) {
      console.error(err);
      toggleBtn.textContent = 'Start';
      statusLabel.textContent = 'Error';
      alert('Microphone access denied.');
    }
  } else {
    stopAudio();
    toggleBtn.textContent = 'Start';
    toggleBtn.classList.remove('active');
    statusLabel.textContent = 'Idle';
    statusLabel.classList.remove('live');
  }
});
</script>

</body>
</html>
